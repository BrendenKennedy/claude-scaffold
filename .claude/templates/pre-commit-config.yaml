# .pre-commit-config.yaml — enforcement on HUMAN commits.
# The scaffold's validate-python hook formats what Claude edits; it never sees a human `git commit`.
# This closes that gap. One-time setup in the target project: `uvx pre-commit install`
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.2
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]
  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.1
    hooks:
      - id: nbstripout # notebooks commit clean — outputs stripped (see the notebooks skill)
